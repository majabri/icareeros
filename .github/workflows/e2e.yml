name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Tests run against the live Vercel deployment — no local server needed
      PLAYWRIGHT_BASE_URL: https://icareeros.vercel.app
      # Supabase dev project (kuneabeiwcxavvyyfjkx)
      NEXT_PUBLIC_SUPABASE_URL: https://kuneabeiwcxavvyyfjkx.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      # Dedicated E2E test user credentials — enables dashboard content tests
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: package-lock.json is not committed (uses npm install --legacy-peer-deps)

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
