name: Test Secrets

on:
  push:
    branches: [main, week-2-postgres-setup]
  pull_request:
    branches: [main]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check all secrets
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PASS=true
          if [ -n "$CLAUDE_API_KEY" ]; then
            echo "✅ CLAUDE_API_KEY is set"
          else
            echo "❌ CLAUDE_API_KEY is NOT set — add it in repo Settings → Secrets"
            PASS=false
          fi
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "✅ SUPABASE_SERVICE_ROLE_KEY is set"
          else
            echo "❌ SUPABASE_SERVICE_ROLE_KEY is NOT set"
            PASS=false
          fi
          if [ -n "$SUPABASE_URL" ]; then
            echo "✅ SUPABASE_URL is set"
          else
            echo "❌ SUPABASE_URL is NOT set"
            PASS=false
          fi
          if [ -n "$GH_TOKEN" ]; then
            echo "✅ GH_TOKEN is set"
          else
            echo "❌ GH_TOKEN is NOT set"
            PASS=false
          fi
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "✅ VERCEL_TOKEN is set"
          else
            echo "❌ VERCEL_TOKEN is NOT set"
            PASS=false
          fi
          if [ "$PASS" = "true" ]; then
            echo ""
            echo "✅ All 5 secrets are configured and accessible!"
          else
            echo ""
            echo "❌ One or more secrets are missing — see above"
            exit 1
          fi
