name: Test Secrets

on:
  push:
    branches: [main, week-2-postgres-setup]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Claude API Key
        if: ${{ secrets.CLAUDE_API_KEY != '' }}
        run: echo "✅ CLAUDE_API_KEY is set"

      - name: Verify Supabase Service Role Key
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: echo "✅ SUPABASE_SERVICE_ROLE_KEY is set"

      - name: Verify Supabase URL
        if: ${{ secrets.SUPABASE_URL != '' }}
        run: echo "✅ SUPABASE_URL is set"

      - name: Verify GitHub Token
        if: ${{ secrets.GH_TOKEN != '' }}
        run: echo "✅ GH_TOKEN is set"

      - name: Verify Vercel Token
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: echo "✅ VERCEL_TOKEN is set"

      - name: All Secrets Verified!
        run: echo "✅ All 5 secrets are configured and accessible!"
