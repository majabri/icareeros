name: Test Secrets

on:
  push:
    branches: [main, week-2-postgres-setup]
  pull_request:
    branches: [main]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check all secrets
        env:
          # Accept either name during the rename window. Runtime reads ANTHROPIC_API_KEY;
          # CLAUDE_API_KEY is the legacy name that some setups still have configured.
          # Once the rename is complete, drop the CLAUDE_API_KEY line.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PASS=true
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$CLAUDE_API_KEY" ]; then
            if [ -n "$ANTHROPIC_API_KEY" ]; then
              echo "✅ ANTHROPIC_API_KEY is set (canonical)"
            else
              echo "⚠️  CLAUDE_API_KEY is set (legacy) — rename to ANTHROPIC_API_KEY when convenient"
            fi
          else
            echo "❌ Neither ANTHROPIC_API_KEY nor CLAUDE_API_KEY is set — add ANTHROPIC_API_KEY in repo Settings → Secrets"
            PASS=false
          fi
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "✅ SUPABASE_SERVICE_ROLE_KEY is set"
          else
            echo "❌ SUPABASE_SERVICE_ROLE_KEY is NOT set"
            PASS=false
          fi
          if [ -n "$SUPABASE_URL" ]; then
            echo "✅ SUPABASE_URL is set"
          else
            echo "❌ SUPABASE_URL is NOT set"
            PASS=false
          fi
          if [ -n "$GH_TOKEN" ]; then
            echo "✅ GH_TOKEN is set"
          else
            echo "❌ GH_TOKEN is NOT set"
            PASS=false
          fi
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "✅ VERCEL_TOKEN is set"
          else
            echo "❌ VERCEL_TOKEN is NOT set"
            PASS=false
          fi
          if [ "$PASS" = "true" ]; then
            echo ""
            echo "✅ All required secrets are configured."
          else
            echo ""
            echo "❌ One or more required secrets are missing — see above"
            exit 1
          fi
