name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-checks:
    name: Type-check + Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # fix/jobs-curator-deno-port Fix 2 — every edge function under
      # supabase/functions/ must type-check with `deno check`. PR #370
      # shipped call sites for functions that were never defined
      # (ReferenceError on every invoke) because Deno files were never
      # type-checked in CI. This step closes that gap and is a required
      # status check per branch-protection settings.
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # Pin the exact version. Floating `v2.x` means a Deno release
          # could break CI without any code change on our side. Bump this
          # deliberately by editing the version below (proven locally
          # first). 2026-07-14 — validated at v2.9.2.
          deno-version: v2.9.2
          # Cache downloaded modules across CI runs. Every edge function
          # imports @supabase/supabase-js from esm.sh + the ingest-ats
          # function pulls deno.land/std; cold-cache CI runs currently
          # spend 20-40s downloading these. Cache-hit path is <5s.
          # The action defaults cache-hash to a hash of deno.lock files;
          # we don't check one in, so the key falls back to just the
          # deno-version, which is what we want — shared across runs.
          cache: true

      - name: Deno check edge functions
        # Glob widened 2026-07-14 from `*/index.ts` to `*/*.ts` so helper
        # files (curator's lib.ts, potential future co-located test .ts,
        # anything not on the direct import path from index.ts) are also
        # type-checked. A helper file that's never imported would
        # otherwise pass CI silently and only fail at deploy or runtime.
        # Baseline validated 2026-07-14: all 10 .ts files under
        # supabase/functions/**/*.ts pass on main HEAD 978b6ef.
        run: |
          fail=0
          for f in supabase/functions/*/*.ts; do
            echo "-- deno check $f --"
            if ! deno check "$f"; then
              fail=1
            fi
          done
          exit $fail
