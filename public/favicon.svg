<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="none">
  <!-- iCareerOS favicon — from docs/specs/logo-final-system.html (light, 16px favicon).
       Light background by default; switches to dark variant when the user agent
       reports prefers-color-scheme: dark, so OS-level dark mode in the browser
       chrome (tab bar, bookmark bar) gets a contrast-correct icon. -->
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0F1B2D; stroke: hsl(220,65%,18%); }
      .os { fill: hsl(172,70%,72%); }
    }
  </style>
  <rect class="bg" width="16" height="16" rx="3.5" fill="#fff" stroke="hsl(220,60%,92%)" stroke-width="1"/>
  <text class="os" x="8" y="12" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6.5" font-weight="900" fill="#00B8A9">OS</text>
</svg>
